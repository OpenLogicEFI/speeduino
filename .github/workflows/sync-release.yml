name: Sync from upstream (master + release-ish)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream + fetch
        run: |
          git remote add upstream https://github.com/UPSTREAM_OWNER/UPSTREAM_REPO.git
          git fetch upstream --prune

      - name: Detect release branch
        id: detect
        shell: bash
        run: |
          # List upstream branches
          git branch -r | sed 's/^[ *]*//' | sort

          # Heuristics: pick the first matching branch name.
          # Tweak these patterns to match your upstream's naming style.
          RELEASE_REF="$(git branch -r \
            | sed 's/^[ *]*//' \
            | grep -E '^upstream/(release($|[-/])|releases/|maintenance/|stable($|[-/]))' \
            | head -n 1 || true)"

          if [ -z "$RELEASE_REF" ]; then
            echo "No release-like upstream branch found."
            echo "release_branch=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_BRANCH="${RELEASE_REF#upstream/}"
          echo "Found release-like branch: $RELEASE_BRANCH"
          echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Sync master
        run: |
          git checkout master || git checkout -b master upstream/master
          git merge upstream/master --no-edit || { echo "master merge failed; skipping push"; exit 0; }
          git push origin master

      - name: Sync detected release branch (if found)
        if: steps.detect.outputs.release_branch != ''
        run: |
          BR="${{ steps.detect.outputs.release_branch }}"
          echo "Syncing branch: $BR"

          # Create local branch if needed
          git checkout "$BR" 2>/dev/null || git checkout -b "$BR" "upstream/$BR"

          git merge "upstream/$BR" --no-edit || { echo "$BR merge failed; skipping push"; exit 0; }
          git push origin "$BR"
