name: Sync from upstream (Speeduino)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch: [master, release]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/speeduino/speeduino.git
          git fetch upstream --prune

      - name: Sync branch
        run: |
          BR=${{ matrix.branch }}

          if ! git show-ref --verify --quiet refs/remotes/upstream/$BR; then
            echo "Upstream branch $BR not found, skipping."
            exit 0
          fi

          git checkout $BR || git checkout -b $BR upstream/$BR
          git merge upstream/$BR --no-edit || { echo "Merge conflict, skipping."; exit 0; }
          git push origin $BR
