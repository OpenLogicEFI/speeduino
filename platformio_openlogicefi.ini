[env:MEGA32]
extends = env:black_F407VE

build_flags =
    ${env:black_F407VE.build_flags}
    -DOPENLOGICEFI_MEGA32
    -Ivariants/MEGA32
    -Ivariants/MEGA32/core

build_src_filter =
    ${env:black_F407VE.build_src_filter}
    +<variants/MEGA32/init.cpp>
    +<variants/MEGA32/*.cpp>
    +<variants/MEGA32/core/*.cpp>