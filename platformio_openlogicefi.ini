[env:MEGA32]
extends = env:black_F407VE

board_build.variant = MEGA32
board_build.variants_dir = variants

build_flags =
    ${env:black_F407VE.build_flags}
    -DOPENLOGICEFI_MEGA32
    -Ivariants/MEGA32
    -Ispeeduino/variants/MEGA32

build_src_filter =
    +<*>
    -<init.cpp>
    +<variants/MEGA32/init.cpp>